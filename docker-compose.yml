services:
  db:
    image: postgres:16
    container_name: unap_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unap123}
      POSTGRES_DB: ${POSTGRES_DB:-unap_repo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
